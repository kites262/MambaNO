defaults:
  - _self_
  - exp: v0

root_dir: ${hydra:runtime.cwd}
data_dir: ${root_dir}/data

swanlab: "offline"

hydra:
  job:
    chdir: true
  run:
    dir: ${hydra:runtime.cwd}/${exp.name}/${exp.dataset}/seed${exp.seed}-lr${exp.lr}
  sweep:
    subdir: ""

exp:
  # ["HanChuan", "HongHu"]
  dataset: "HanChuan"
  train_samples: 30
  val_samples: 10
  seed: 42
  epoch: 2
  lr: 3e-4
  split_image: false
  src:
    - train.py
    - utils/Loss.py
  optimizer:
    label_smoothing: 0
    weight_decay: 0
  # Optional LR scheduler. If omitted, constant learning rate is used.
  # lr_scheduler:
  #   name: "cosine"  # "constant" | "cosine"
  #   warmup_epochs: 0
  #   min_lr: 1e-6
  #   # min_lr_ratio: 0.01
